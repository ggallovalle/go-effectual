# yaml-language-server: schema=https://json.schemastore.org/lefthook.json
commit-msg:
    jobs:
        - name: lint commit
          run: "mise run lint-commit {1}"
pre-commit:
    parallel: true
    jobs:
        - name: lint
          run: mise run lint
        - name: test
          run: mise run test
        - name: check
          run: mise run check
